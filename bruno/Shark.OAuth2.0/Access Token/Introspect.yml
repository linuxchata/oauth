info:
  name: Introspect
  type: http
  seq: 8

http:
  method: POST
  url: "{{HostUri}}/introspect"
  body:
    type: form-urlencoded
    data:
      - name: token
        value: "{{AccessToken}}"
  auth:
    type: basic
    username: "{{ClientIdPermanent}}"
    password: "{{ClientSecretPermanent}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
