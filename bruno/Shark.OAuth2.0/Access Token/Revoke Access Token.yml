info:
  name: Revoke Access Token
  type: http
  seq: 9

http:
  method: POST
  url: "{{HostUri}}/revoke"
  body:
    type: form-urlencoded
    data:
      - name: token
        value: "{{AccessToken}}"
      - name: token_hint
        value: access_token
  auth:
    type: basic
    username: "{{ClientIdPermanent}}"
    password: "{{ClientSecretPermanent}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
