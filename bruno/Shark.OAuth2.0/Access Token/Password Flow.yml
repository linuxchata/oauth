info:
  name: Password Flow
  type: http
  seq: 4

http:
  method: POST
  url: "{{HostUri}}/token"
  headers:
    - name: Content-Type
      value: application/x-www-form-urlencoded
  body:
    type: form-urlencoded
    data:
      - name: client_id
        value: "{{ClientIdPermanent}}"
      - name: client_secret
        value: "{{ClientSecretPermanent}}"
      - name: username
        value: alice
      - name: password
        value: secret
      - name: grant_type
        value: password
      - name: scope
        value: read
  auth:
    type: basic

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
